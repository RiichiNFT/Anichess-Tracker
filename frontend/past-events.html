<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Past Events — Anichess Tracker</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C5P8BG33DT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-C5P8BG33DT');
  </script>
  <link rel="icon" id="favicon" href="/favicon.ico">
  <link rel="stylesheet" href="style.css" />
  <script>(function(){var u=sessionStorage.getItem('anichess-bg-url');if(u){document.documentElement.style.setProperty('--bg-image','url('+u+')');document.documentElement.classList.add('bg-preloaded');}})();</script>
  <style>
    /* ── Past Events page ── */
    .past-events-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .past-event-card {
      background: rgba(16,25,50,0.82);
      border: 1px solid rgba(0,174,250,0.14);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: border-color 0.2s;
    }

    .past-event-card:hover {
      border-color: var(--border-light);
    }

    .past-event-header {
      padding: 20px 28px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(237,199,41,0.03);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      position: relative;
      overflow: hidden;
    }

    .past-event-header::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 220px;
      background-image: repeating-conic-gradient(
        rgba(255, 255, 255, 0.030) 0% 25%,
        transparent 0% 50%
      );
      background-size: 26px 26px;
      -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.45), transparent);
      mask-image: linear-gradient(to left, rgba(0,0,0,0.45), transparent);
      pointer-events: none;
    }

    .past-event-title-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      z-index: 1;
    }

    .past-event-title {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .past-event-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .past-event-date {
      font-size: 0.82rem;
      color: var(--text-2);
      font-weight: 500;
    }

    .past-event-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-3);
      flex-shrink: 0;
    }

    .past-event-badges {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }

    .completed-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.28);
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--green);
    }

    /* ── Event body — results + actions ── */
    .past-event-body {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0;
    }

    .past-event-results {
      padding: 22px 28px;
      border-right: 1px solid var(--border);
    }

    .past-event-results-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 14px;
    }

    .podium-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .podium-row:last-child { border-bottom: none; }

    .podium-place {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 26px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .podium-place.gold   { background: rgba(237,199,41,0.12); color: var(--gold);  border: 1px solid rgba(237,199,41,0.38); }
    .podium-place.silver { background: rgba(220,228,240,0.08); color: #dce4f0;     border: 1px solid rgba(220,228,240,0.32); }
    .podium-place.bronze { background: rgba(205,127,50,0.10);  color: #d4895a;     border: 1px solid rgba(205,127,50,0.32); }
    .podium-place.qualified { background: rgba(0,174,250,0.10); color: var(--accent); border: 1px solid rgba(0,174,250,0.32); font-size: 0.85rem; }

    .podium-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
    }

    .podium-name.gold-name   { color: var(--gold); }
    .podium-name.silver-name { color: #dce4f0; }
    .podium-name.bronze-name { color: #d4895a; }

    .podium-name.tbd { color: var(--text-3); font-style: italic; font-weight: 400; }

    a.podium-name {
      text-decoration: none;
      transition: opacity 0.15s;
    }
    a.podium-name:hover { opacity: 0.75; }

    .past-event-actions {
      padding: 22px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 10px;
      min-width: 200px;
    }

    .past-event-info-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 14px;
    }

    .past-event-info-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .past-event-info-val {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
    }

    .past-event-info-val.gold-val { color: var(--gold); }

    .btn-replay {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 16px;
      background: rgba(0,174,250,0.08);
      border: 1px solid rgba(0,174,250,0.30);
      border-radius: 8px;
      color: var(--accent);
      font-size: 0.80rem;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-replay:hover {
      background: rgba(0,174,250,0.16);
      border-color: rgba(0,174,250,0.55);
    }

    .btn-replay.coming-soon {
      opacity: 0.4;
      cursor: default;
      pointer-events: none;
    }

    .btn-bracket {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 16px;
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      color: var(--text-2);
      font-size: 0.80rem;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .btn-bracket:hover {
      border-color: var(--border-light);
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }

    /* ── No events state ── */
    .no-events {
      text-align: center;
      padding: 60px 28px;
      color: var(--text-3);
      font-size: 0.9rem;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .past-event-body {
        grid-template-columns: 1fr;
      }
      .past-event-results {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 18px 20px;
      }
      .past-event-actions {
        padding: 18px 20px;
        flex-direction: row;
        flex-wrap: wrap;
        min-width: 0;
      }
      .past-event-info-item { display: none; }
    }

    @media (max-width: 540px) {
      .past-event-header { padding: 16px 16px 14px; }
      .past-event-title  { font-size: 1.2rem; }
      .past-event-results { padding: 16px; }
      .past-event-actions { padding: 14px 16px; }
    }
  </style>
</head>
<body>
  <div id="page-loader" class="page-loader">
    <div class="page-loader-inner">
      <div class="page-loader-spinner"></div>
      <span class="page-loader-text">Loading…</span>
    </div>
  </div>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <a class="logo" href="https://www.anichesstracker.com/" rel="noopener">
          <span class="logo-icon" id="logo-icon" style="display:none">♟</span>
          <img id="logo-img" class="logo-img" src="" alt="Logo" style="display:none"
               onerror="this.style.display='none';document.getElementById('logo-icon').style.display='';localStorage.removeItem('anichess-logo')">
          <script>(function(){var l=localStorage.getItem('anichess-logo'),i=document.getElementById('logo-img'),ic=document.getElementById('logo-icon');if(l&&i&&ic){i.src=l;i.style.display='block';}else if(ic){ic.style.display='';}})()</script>
          <div class="logo-text-group">
            <span class="logo-name">ANICHESS <span class="logo-accent">TRACKER</span></span>
          </div>
        </a>
        <nav class="header-nav">
          <a class="header-nav-link internal" href="/tournament.html" data-track="Tournament Details" data-track-category="navigation">Tournament Details</a>
          <a class="header-nav-link internal" href="/guides.html" data-track="Guides" data-track-category="navigation">Guides</a>
          <a class="header-nav-link internal active-nav-link" href="/past-events.html" data-track="Past Events" data-track-category="navigation">Past Events</a>
          <span class="nav-update-wrap">
            <a class="header-nav-link internal" href="/updates.html" data-track="Game Updates" data-track-category="navigation">Game Updates</a>
            <span class="nav-update-chip"><span class="nav-update-dot"></span>Jun 10</span>
          </span>
          <span class="nav-sep"></span>
          <a class="header-nav-link" href="https://www.anichess.com/login?referralWallet=0xaa4ebe9298445ae81e993ebd15b05b074c62b267" target="_blank" rel="noopener" data-track="Play Anichess" data-track-category="navigation">Play Anichess</a>
          <a class="header-nav-link" href="https://medium.com/@Anichess/anichess-season-8-overpowered-7c45ebe483f5" target="_blank" rel="noopener" data-track="Season 8" data-track-category="navigation">Season 8</a>
          <a class="header-nav-link" href="https://lichess.org/team/anichess-community" target="_blank" rel="noopener" data-track="Lichess Team" data-track-category="navigation">Lichess Team</a>
          <a class="header-nav-link" href="https://discord.com/invite/anichess" target="_blank" rel="noopener" data-track="Discord Nav" data-track-category="navigation">Discord</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="section-heading-wrap" style="margin-bottom: 20px;">
      <div class="section-heading-group">
        <h2 class="section-heading">Past <strong>Events</strong></h2>
        <p class="section-heading-sub">View results and match replays from completed Anichess tournaments</p>
      </div>
    </div>

    <div class="past-events-list" id="past-events-list">
      <div class="no-events" id="past-events-loading">Loading events…</div>
    </div>
  </main>

  <footer>
    <span>Anichess Ranked Tracker</span>
    <span class="sep">·</span>
    <span>Past Events</span>
  </footer>

  <script>
    async function applyLogo() {
      const logoImg  = document.getElementById('logo-img');
      const logoIcon = document.getElementById('logo-icon');
      if (!logoImg || !logoIcon) return;
      const cached = localStorage.getItem('anichess-logo');
      if (cached) {
        logoImg.src = cached;
        logoImg.style.display = 'block';
        logoIcon.style.display = 'none';
      }
      try {
        const res = await fetch('/api/logo');
        if (!res.ok) return;
        const data = await res.json();
        if (data.exists && data.filename) {
          const path = `/${data.filename}`;
          localStorage.setItem('anichess-logo', path);
          logoImg.src = path;
          logoImg.style.display = 'block';
          logoIcon.style.display = 'none';
          const favicon = document.getElementById('favicon');
          if (favicon) favicon.href = '/favicon.ico';
        } else {
          localStorage.removeItem('anichess-logo');
          logoImg.style.display = 'none';
          logoIcon.style.display = '';
        }
      } catch {}
    }

    if (document.documentElement.classList.contains('bg-preloaded')) {
      document.body.classList.add('has-bg');
    }

    async function applyBackground() {
      try {
        let url = sessionStorage.getItem('anichess-bg-url');
        if (!url) {
          const res = await fetch('/api/background');
          if (!res.ok) return;
          const data = await res.json();
          if (data.exists && data.filename) {
            url = `/${data.filename}`;
            sessionStorage.setItem('anichess-bg-url', url);
          } else {
            sessionStorage.removeItem('anichess-bg-url');
            document.documentElement.style.setProperty('--bg-image', 'none');
            document.body.classList.remove('has-bg');
            return;
          }
        }
        document.documentElement.style.setProperty('--bg-image', `url(${url})`);
        if (!document.body.classList.contains('has-bg')) {
          requestAnimationFrame(() => requestAnimationFrame(() => {
            document.body.classList.add('has-bg');
          }));
        }
      } catch {}
    }

    function dismissLoader() {
      const loader = document.getElementById('page-loader');
      if (!loader) return;
      loader.classList.add('fading');
      loader.addEventListener('transitionend', () => loader.remove(), { once: true });
    }

    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    const PLACE_CLS   = { 1: 'gold',   2: 'silver',  3: 'bronze'  };
    const PLACE_LABEL = { 1: '1st',    2: '2nd',     3: '3rd'     };
    const NAME_CLS    = { 1: 'gold-name', 2: 'silver-name', 3: 'bronze-name' };

    function renderEventCard(ev) {
      const podiumRows = (ev.podium || []).map(p => {
        const profileUrl = p.wallet ? `https://anichess.com/profile/${esc(p.wallet)}/` : '#';
        if (ev.qualified) {
          return `<div class="podium-row">
              <span class="podium-place qualified">★</span>
              <a class="podium-name player-link" href="${esc(profileUrl)}" target="_blank" rel="noopener">${esc(p.username)}</a>
            </div>`;
        }
        const cls   = PLACE_CLS[p.place]   || '';
        const label = PLACE_LABEL[p.place] || `${p.place}th`;
        const nameCls = NAME_CLS[p.place]  || '';
        return `<div class="podium-row">
              <span class="podium-place ${cls}">${label}</span>
              <a class="podium-name ${nameCls} player-link" href="${esc(profileUrl)}" target="_blank" rel="noopener">${esc(p.username)}</a>
            </div>`;
      }).join('\n            ');

      const replayBtn = ev.replayUrl
        ? `<a class="btn-replay" href="${esc(ev.replayUrl)}">▶ View Replays</a>`
        : `<span class="btn-replay coming-soon">▶ Replays Soon</span>`;
      const bracketBtn = ev.bracketUrl
        ? `<a class="btn-bracket" href="${esc(ev.bracketUrl)}">${esc(ev.bracketLabel || 'View Bracket')}</a>`
        : '';

      return `<div class="past-event-card">
        <div class="past-event-header">
          <div class="past-event-title-group">
            <div class="past-event-title">${esc(ev.title)}</div>
            <div class="past-event-meta">
              <span class="past-event-date">${esc(ev.date)}${ev.time ? ' · ' + esc(ev.time) : ''}</span>
              ${ev.prizePool ? `<span class="past-event-dot"></span><div class="prize-pool-tag" style="margin-top:0">${esc(ev.prizePool)} Prize Pool</div>` : ''}
            </div>
          </div>
          <div class="past-event-badges">
            <span class="completed-badge">✓ Completed</span>
          </div>
        </div>
        <div class="past-event-body">
          <div class="past-event-results">
            <div class="past-event-results-label">${esc(ev.resultsLabel || 'Final Results')}</div>
            ${podiumRows}
          </div>
          <div class="past-event-actions">
            ${ev.format ? `<div class="past-event-info-item"><span class="past-event-info-label">Format</span><span class="past-event-info-val">${esc(ev.format)}</span></div>` : ''}
            ${ev.eligibility ? `<div class="past-event-info-item"><span class="past-event-info-label">Eligibility</span><span class="past-event-info-val">${esc(ev.eligibility)}</span></div>` : ''}
            ${replayBtn}
            ${bracketBtn}
          </div>
        </div>
      </div>`;
    }

    async function loadPastEvents() {
      try {
        const res = await fetch('/api/past-events');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const events = await res.json();
        const list = document.getElementById('past-events-list');
        if (!Array.isArray(events) || events.length === 0) {
          list.innerHTML = '<div class="no-events">No past events yet.</div>';
          return;
        }
        list.innerHTML = events.map(renderEventCard).join('\n');
      } catch {
        document.getElementById('past-events-list').innerHTML =
          '<div class="no-events">Could not load events.</div>';
      }
    }

    applyLogo();
    applyBackground();
    loadPastEvents();
    dismissLoader();
  </script>
  <script src="/mobile-nav.js" defer></script>
</body>
</html>
