<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournament Bracket — Anichess</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C5P8BG33DT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-C5P8BG33DT');
  </script>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/fonts.css">
  <script>if (new URLSearchParams(location.search).get('embed') === '1') document.documentElement.classList.add('embed-mode');</script>
  <script>(function(){var u=sessionStorage.getItem('anichess-bg-url');if(u)document.documentElement.style.setProperty('--bg-preload','url('+u+')');})();</script>
  <link rel="stylesheet" href="/bracket.css">
</head>
<body>
  <div class="bp-bg" id="bp-bg"></div>

  <div class="bp-topbar">
    <a class="bp-brand" href="https://www.anichesstracker.com/" rel="noopener">
      <img class="bp-brand-icon" src="/logo-image.png" alt="" onerror="this.outerHTML='<span style=&quot;font-size:1.05rem;color:var(--conn-bright)&quot;>♟</span>'"><script>(function(){var l=localStorage.getItem('anichess-logo');if(l){var i=document.querySelector('.bp-brand-icon');if(i)i.src=l;}})()</script>
      <span class="bp-brand-name">ANICHESS <span class="bp-brand-accent">TRACKER</span></span>
    </a>
    <div style="display:flex;align-items:center;gap:12px">
      <button class="bp-screenshot-btn" id="screenshot-btn" onclick="downloadBracketJpg()" disabled title="Bracket not yet available">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 1H3a2 2 0 0 0-2 2v3M10 1h3a2 2 0 0 1 2 2v3M6 15H3a2 2 0 0 1-2-2v-3M10 15h3a2 2 0 0 0 2-2v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        Save as JPG
      </button>
      <div class="bp-status">
        <div class="bp-dot" id="bp-dot"></div>
        <span class="bp-status-text" id="bp-status-text">UPCOMING</span>
      </div>
    </div>
  </div>
  <div class="bp-round-nav" id="bp-round-nav" style="display:none">
    <button class="bp-rnav-btn" id="bp-rnav-prev" aria-label="Previous round">&#8249;</button>
    <div class="bp-rnav-center">
      <span class="bp-rnav-label" id="bp-rnav-label">Quarterfinals</span>
      <div class="bp-rnav-dots" id="bp-rnav-dots"></div>
    </div>
    <button class="bp-rnav-btn" id="bp-rnav-next" aria-label="Next round">&#8250;</button>
  </div>

  <div class="bp-page" id="bp-page">
    <div id="state-pending" class="bp-pending" style="display:none;">
      <div class="bp-pending-icon">🏆</div>
      <div class="bp-pending-title" id="pending-title">Tournament Bracket</div>
      <div class="bp-pending-sub">The bracket will appear here once seeding is complete and the bracket is generated.</div>
    </div>

    <div id="state-bracket" style="display:none;">
      <div class="bp-scale-host" id="bp-scale-host">
        <div class="bp-stage-wrap" id="stage-wrap">
          <div class="bp-label-row" id="label-row"></div>
          <div class="bp-stage" id="bracket-stage"></div>
        </div>
      </div>
      <div class="bp-third" id="third-section" style="display:none;">
        <div class="bp-third-label">3rd Place Match</div>
        <div id="third-card"></div>
      </div>
    </div>
  </div>

  <div class="bp-footer">
    <span class="bp-footer-text">Auto-refreshes every 60s</span>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    let playerMap     = {}; // wallet.toLowerCase() → displayName
    let playerAvatar  = {}; // wallet.toLowerCase() → avatar URL
    let playerCountry = {}; // wallet.toLowerCase() → ISO-3166-1 alpha-2 code
    let playerAliases = {}; // wallet.toLowerCase() → custom alias (overrides all)
    let bracketData   = null;

    // Read ?event= param to serve archived brackets (e.g. ?event=rs2)
    const _eventParam = new URLSearchParams(location.search).get('event') || '';

    // Avatar colour palette (cycles by seed)
    const AV_COLORS = [
      '#00aefa','#6366f1','#ec4899','#f59e0b','#10b981',
      '#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16'
    ];
    const avColor = seed => AV_COLORS[((parseInt(seed) || 1) - 1) % AV_COLORS.length];
    const avInitial = name => (name || '?')[0].toUpperCase();

    // ── Boot ──────────────────────────────────────────────────────────────────
    let bracketLoadTimeout = null;

    async function init() {
      // Show error if bracket hasn't rendered within 3 seconds
      bracketLoadTimeout = setTimeout(() => {
        const statePending  = document.getElementById('state-pending');
        const stateBracket  = document.getElementById('state-bracket');
        const bothHidden = (!statePending  || statePending.style.display  === 'none') &&
                           (!stateBracket  || stateBracket.style.display  === 'none');
        if (bothHidden) {
          const page = document.getElementById('bp-page');
          const errorEl = document.createElement('div');
          errorEl.id = 'bp-load-error';
          errorEl.style.cssText = 'text-align:center;padding:40px;color:var(--text-2);font-size:0.95rem;background:var(--bg-card,rgba(255,255,255,0.04));border-radius:12px;margin:auto;';
          errorEl.innerHTML = 'Bracket could not load. <a href="" style="color:var(--accent,#00aefa)">Try refreshing</a>.';
          if (page) page.appendChild(errorEl);
        }
      }, 3000);

      // loadPlayers must finish before loadBracket so the name map is ready when render() fires
      await Promise.all([loadBg(), loadPlayers()]);
      await loadBracket();
    }

    async function loadBg() {
      try {
        const r = await fetch('/api/bracket-background');
        if (!r.ok) return;
        const d = await r.json();
        if (!d.exists || !d.filename) return;
        const url = `/${d.filename}?t=${Date.now()}`;
        sessionStorage.setItem('anichess-bg-url', url);
        document.getElementById('bp-bg').style.backgroundImage = `url(${url})`;
      } catch {}
    }

    async function loadPlayers() {
      try {
        const playersUrl = _eventParam ? `/players-${_eventParam}.json` : '/api/players';
        const [playersRes, countriesRes, aliasRes] = await Promise.all([
          fetch(playersUrl),
          fetch('/api/player-countries'),
          fetch('/api/player-aliases'),
        ]);
        const list = await playersRes.json();
        const countries = countriesRes.ok ? await countriesRes.json() : {};
        playerAliases = aliasRes.ok ? await aliasRes.json() : {};
        playerMap = {};
        playerAvatar = {};
        // Seed all known countries first (covers non-tracked bracket participants)
        Object.assign(playerCountry, countries);
        list.forEach(p => {
          if (!p.wallet) return;
          const key = p.wallet.toLowerCase();
          playerMap[key] = isEVMAddress(p.username) ? fmtWallet(p.wallet) : p.username;
          if (p.avatar)   playerAvatar[key]  = p.avatar;
          if (p.country)  playerCountry[key] = p.country;
        });
      } catch {}
    }

    async function loadBracket() {
      try {
        const url = _eventParam ? `/api/brackets?event=${encodeURIComponent(_eventParam)}` : '/api/brackets';
        const r = await fetch(url);
        bracketData = await r.json();
        render();
      } catch {}
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render() {
      const d = bracketData;

      // Bracket loaded — cancel the error timeout and clear any existing error
      if (bracketLoadTimeout !== null) {
        clearTimeout(bracketLoadTimeout);
        bracketLoadTimeout = null;
      }
      const existingError = document.getElementById('bp-load-error');
      if (existingError) existingError.parentNode.removeChild(existingError);

      // Enable screenshot button now that bracket data is available
      const screenshotBtn = document.getElementById('screenshot-btn');
      if (screenshotBtn) {
        screenshotBtn.disabled = false;
        screenshotBtn.removeAttribute('title');
      }

      // Status indicator
      const dot = document.getElementById('bp-dot');
      const stText = document.getElementById('bp-status-text');
      dot.className = 'bp-dot';
      stText.className = 'bp-status-text';
      if (d.status === 'active') {
        dot.classList.add('live');
        stText.classList.add('live');
        stText.textContent = 'LIVE';
      } else if (d.status === 'complete') {
        dot.classList.add('complete');
        stText.classList.add('complete');
        stText.textContent = 'COMPLETE';
      } else {
        stText.textContent = 'UPCOMING';
      }

      // Pending state
      if (!d.rounds || d.rounds.length === 0) {
        document.getElementById('state-pending').style.display = '';
        document.getElementById('state-bracket').style.display = 'none';
        const title = (d.bracketName || '').trim();
        if (title) document.getElementById('pending-title').textContent = title;
        return;
      }

      document.getElementById('state-pending').style.display = 'none';
      document.getElementById('state-bracket').style.display = '';
      renderStage(d);
    }

    function renderStage(d) {
      const rounds = d.rounds || [];
      const qf  = rounds.find(r => r.id === 'qf');
      const sf  = rounds.find(r => r.id === 'sf');
      const r16 = rounds.find(r => r.id === 'r16');
      if (!sf) return;

      const stage = document.getElementById('bracket-stage');
      const labelRow = document.getElementById('label-row');
      stage.innerHTML = '';
      labelRow.innerHTML = '';

      const tourName = (d.bracketName || '').trim() || 'TOURNAMENT BRACKET';

      // Store bracket data for mobile navigator
      window.__bracketData = d;

      if (r16 && !qf) {
        // Rare: 16-player without a separate QF phase — fallback to linear
        renderLinear(stage, rounds, d, tourName);
      } else if (r16 && qf) {
        render16(stage, labelRow, d, r16, qf, sf, tourName);
      } else if (qf) {
        render8(stage, labelRow, d, qf, sf, tourName);
      } else {
        renderLinear(stage, rounds, d, tourName);
      }

      // Bracket stops at Semifinals — hide third-place section
      document.getElementById('third-section').style.display = 'none';

      // Initialise mobile round navigator (no-op on desktop/tablet)
      initMobileNav();

      // Scale bracket to fit viewport on tablet/desktop (no-op on mobile)
      applyBracketScale();
    }

    // ── 8-player mirrored bracket ─────────────────────────────────────────────
    function render8(stage, labelRow, d, qf, sf, tourName) {
      // Card widths
      const CW = 338, GCW = 380;
      // Connector widths
      const PCW = 22,  // pair connector
            HC1 = 55,  // QF→SF horizontal
            HC2 = 74;  // SF→center horizontal

      // Round labels (centred over each column)
      const rlDefs = [
        { w: CW,            label: 'QUARTERFINALS' },
        { w: PCW + HC1,     label: ''              },
        { w: CW,            label: 'SEMIFINALS'    },
        { w: HC2,           label: ''              },
        { w: GCW + 40,      label: 'FINALISTS'     },
        { w: HC2,           label: ''              },
        { w: CW,            label: 'SEMIFINALS'    },
        { w: PCW + HC1,     label: ''              },
        { w: CW,            label: 'QUARTERFINALS' },
      ];
      rlDefs.forEach(({ w, label }) => {
        const d = el('div', 'bp-rl');
        d.style.width = w + 'px';
        d.textContent = label;
        labelRow.appendChild(d);
      });

      // Left QF column
      const lqf = el('div', 'bp-qf-col bp-side-left');
      lqf.appendChild(buildCard(qf.matches[0], false));
      lqf.appendChild(buildCard(qf.matches[1], false));

      // Left pair connector
      const lpconn = makePairConn(false);

      // Left QF→SF
      const lh1 = makeH(HC1);

      // Left SF
      const lsf = el('div', 'bp-sf bp-side-left');
      lsf.appendChild(buildCard(sf.matches[0], false));

      // Left SF→GF
      const lh2 = makeH(HC2);

      // Center — Top 4 Finalists
      const center = el('div', 'bp-center');
      center.style.width = (GCW + 40) + 'px';
      const titleDiv = el('div', 'bp-title');
      titleDiv.innerHTML = `<div class="bp-title-text">${esc(tourName)}</div>`;
      center.appendChild(titleDiv);
      center.appendChild(buildTop4Panel(sf));

      // Right SF→center
      const rh2 = makeH(HC2);

      // Right SF
      const rsf = el('div', 'bp-sf');
      rsf.appendChild(buildCard(sf.matches[1], false));

      // Right SF→QF
      const rh1 = makeH(HC1);

      // Right pair connector (mirrored)
      const rpconn = makePairConn(true);

      // Right QF column
      const rqf = el('div', 'bp-qf-col');
      rqf.appendChild(buildCard(qf.matches[2], false));
      rqf.appendChild(buildCard(qf.matches[3], false));

      [lqf, lpconn, lh1, lsf, lh2, center, rh2, rsf, rh1, rpconn, rqf]
        .forEach(n => stage.appendChild(n));
    }

    // ── 16-player mirrored bracket ────────────────────────────────────────────
    // Layout (left side): R16[0-3] → pair-conns × 2 → QF[0,1] → QFSF-conn → SF[0] → H → center
    // Dimensions: col-h=352px, pair-h=166px, r16-inter=20px
    //   QF spacers: 45px top/bottom, 110px mid-gap (cards at y=83, y=269)
    //   QFSF connector: s83 + t93 + b93 + s83 = 352px, junction at y=176
    function render16(stage, labelRow, d, r16, qf, sf, tourName) {
      const CW = 283, GCW = 380;
      const PCW = 22, HC1 = 74, HC2 = 74;

      // Round labels
      const rlDefs = [
        { w: CW,       label: 'ROUND OF 16'   },
        { w: PCW,      label: ''              },
        { w: CW,       label: 'QUARTERFINALS' },
        { w: PCW+HC1,  label: ''              },
        { w: CW,       label: 'SEMIFINALS'    },
        { w: HC2,      label: ''              },
        { w: GCW+40,   label: 'FINALISTS'     },
        { w: HC2,      label: ''              },
        { w: CW,       label: 'SEMIFINALS'    },
        { w: PCW+HC1,  label: ''              },
        { w: CW,       label: 'QUARTERFINALS' },
        { w: PCW,      label: ''              },
        { w: CW,       label: 'ROUND OF 16'   },
      ];
      rlDefs.forEach(({ w, label }) => {
        const lbl = el('div', 'bp-rl');
        lbl.style.width = w + 'px';
        lbl.textContent = label;
        labelRow.appendChild(lbl);
      });

      // R16 column: 76+14+76 [20px gap] 76+14+76 = 352px
      function makeR16Col(startIdx) {
        const col = el('div');
        col.style.cssText = 'display:flex;flex-direction:column;align-self:center;flex-shrink:0;';
        const addGap = h => { const g = el('div'); g.style.cssText = `height:${h}px;flex-shrink:0;`; col.appendChild(g); };
        col.appendChild(buildCard(r16.matches[startIdx + 0], false, CW));
        addGap(24);
        col.appendChild(buildCard(r16.matches[startIdx + 1], false, CW));
        addGap(34);
        col.appendChild(buildCard(r16.matches[startIdx + 2], false, CW));
        addGap(24);
        col.appendChild(buildCard(r16.matches[startIdx + 3], false, CW));
        return col;
      }

      // Two stacked bp-pconns with 34px inter-pair gap: 284+34+284 = 602px
      function makeR16Conn(mirror) {
        const wrap = el('div');
        wrap.style.cssText = 'display:flex;flex-direction:column;align-self:center;flex-shrink:0;';
        wrap.appendChild(makePairConn(mirror));
        const inter = el('div'); inter.style.cssText = 'height:34px;flex-shrink:0;';
        wrap.appendChild(inter);
        wrap.appendChild(makePairConn(mirror));
        return wrap;
      }

      // QF column: sp45 + card(76) + sp110 + card(76) + sp45 = 352px
      // Cards at y=83 and y=269 — aligned with R16→QF connector junctions
      function makeQFCol16(m0, m1) {
        const col = el('div');
        col.style.cssText = 'display:flex;flex-direction:column;align-self:center;flex-shrink:0;';
        const addSp = h => { const s = el('div'); s.style.cssText = `height:${h}px;flex-shrink:0;`; col.appendChild(s); };
        addSp(77);
        col.appendChild(buildCard(m0, false, CW));
        addSp(188);
        col.appendChild(buildCard(m1, false, CW));
        addSp(77);
        return col;
      }

      // QF→SF connector (352px, junction at y=176 = SF mid)
      function makeQFSFConn(mirror) {
        const c = el('div', 'bp-qfsf-conn' + (mirror ? ' r' : ''));
        c.innerHTML = `
          <div class="bp-qfsf-s"></div>
          <div class="bp-qfsf-t"></div>
          <div class="bp-qfsf-b"></div>
          <div class="bp-qfsf-s"></div>`;
        return c;
      }

      // ── Left side ──
      const lr16  = makeR16Col(0);   lr16.classList.add('bp-side-left');
      const lr16c = makeR16Conn(false);
      const lqf   = makeQFCol16(qf.matches[0], qf.matches[1]);   lqf.classList.add('bp-side-left');
      const lqfc  = makeQFSFConn(false);
      const lh1   = makeH(HC1);
      const lsf   = el('div', 'bp-sf bp-side-left');
      lsf.appendChild(buildCard(sf.matches[0], false, CW));
      const lh2   = makeH(HC2);

      // ── Center — Top 4 Finalists ──
      const center   = el('div', 'bp-center');
      center.style.width = (GCW + 40) + 'px';
      const titleDiv = el('div', 'bp-title');
      titleDiv.innerHTML = `<div class="bp-title-text">${esc(tourName)}</div>`;
      center.appendChild(titleDiv);
      center.appendChild(buildTop4Panel(sf));

      // ── Right side ──
      const rh2   = makeH(HC2);
      const rsf   = el('div', 'bp-sf');
      rsf.appendChild(buildCard(sf.matches[1], false, CW));
      const rh1   = makeH(HC1);
      const rqfc  = makeQFSFConn(true);
      const rqf   = makeQFCol16(qf.matches[2], qf.matches[3]);
      const rr16c = makeR16Conn(true);
      const rr16  = makeR16Col(4);

      [lr16, lr16c, lqf, lqfc, lh1, lsf, lh2, center, rh2, rsf, rh1, rqfc, rqf, rr16c, rr16]
        .forEach(n => stage.appendChild(n));
    }

    // ── Linear fallback ───────────────────────────────────────────────────────
    function renderLinear(stage, rounds, d, tourName, cw, gcw) {
      const mainRounds = rounds.filter(r => !r.isThirdPlace && r.id !== 'gf');
      mainRounds.forEach((round, i) => {
        if (i > 0) stage.appendChild(makeH(61));
        const col = el('div', null);
        col.style.cssText = 'display:flex;flex-direction:column;gap:21px;align-self:center;flex-shrink:0;';
        round.matches.forEach(m => col.appendChild(buildCard(m, false, cw)));
        stage.appendChild(col);
      });
    }

    // ── Build match card ──────────────────────────────────────────────────────
    function buildCard(match, isGF, overrideW) {
      const card = el('div', 'bp-card' + (isGF ? ' gf' : '') + (match.winner ? ' done' : ''));
      if (overrideW) card.style.width = overrideW + 'px';

      // Show TBD for both slots until the match is ready to be played (pending = waiting for players)
      const pending = !match || match.status === 'pending';
      const p1 = pending ? null : match.p1;
      const p2 = pending ? null : match.p2;
      const s  = match.score || { p1: 0, p2: 0 };
      const p1w = !pending && match.winner && p1 && match.winner === p1.wallet;
      const p2w = !pending && match.winner && p2 && match.winner === p2.wallet;

      card.appendChild(buildRow(p1, pending ? null : s.p1, p1w, !pending && match.winner && !p1w));
      card.appendChild(buildRow(p2, pending ? null : s.p2, p2w, !pending && match.winner && !p2w));
      return card;
    }

    function buildRow(player, score, isWinner, isLoser) {
      const row = el('div', 'bp-player');

      if (!player) {
        row.classList.add('tbd');
        row.innerHTML = `
          <div class="bp-avatar" style="background:rgba(255,255,255,0.08);">?</div>
          <span class="bp-seed">—</span>
          <span class="bp-name" style="color:rgba(255,255,255,0.28);">TBD</span>`;
        return row;
      }

      if (isWinner)      row.classList.add('winner');
      else if (isLoser)  row.classList.add('loser');

      const name        = getName(player.wallet);
      const isWallet    = (name === fmtWallet(player.wallet));
      const color       = avColor(player.seed || 1);
      const scoreStr    = (score !== null && score !== undefined) ? String(score) : '';
      const avatarUrl   = playerAvatar[(player.wallet || '').toLowerCase()];
      const avInit      = avInitial(name);
      const avatarHtml  = avatarUrl
        ? `<img src="${esc(avatarUrl)}" alt="" onerror="var p=this.parentNode;p.textContent='${avInit}';p.style.background='${color}'">`
        : esc(avInit);
      const avatarBg    = avatarUrl ? 'rgba(20,24,40,0.8)' : color;
      const countryCode = playerCountry[(player.wallet || '').toLowerCase()];
      const flagHtml    = countryCode
        ? `<div class="bp-flag" style="background-image:url('https://flagcdn.com/80x60/${countryCode.toLowerCase()}.png');"></div>`
        : '';

      row.innerHTML = `
        <div class="bp-avatar-wrap">
          <div class="bp-avatar" style="background:${avatarBg};">${avatarHtml}</div>
          ${flagHtml}
        </div>
        <span class="bp-seed">#${player.seed}</span>
        <span class="bp-name${isWallet ? ' wallet' : ''}">${esc(name)}</span>
        <span class="bp-score${isWinner ? ' win' : ''}">${esc(scoreStr)}</span>`;
      return row;
    }

    // ── Champion block (profile picture if available, else trophy emoji) ──────
    function buildChampion(wallet) {
      const name = getName(wallet);
      const avatarUrl = playerAvatar[(wallet || '').toLowerCase()];
      const avatarContent = avatarUrl
        ? `<img src="${esc(avatarUrl)}" alt="${esc(name)}" onerror="this.parentNode.textContent='🏆'">`
        : '🏆';
      const avatarBg = avatarUrl ? 'rgba(20,24,40,0.8)' : 'transparent';
      const champ = el('div', 'bp-champion');
      champ.innerHTML = `
        <div class="bp-champion-avatar" style="background:${avatarBg};">${avatarContent}</div>
        <div class="bp-champion-label">Tournament Champion</div>
        <div class="bp-champion-name">${esc(name)}</div>`;
      return champ;
    }

    // ── Top 4 Finalists panel ────────────────────────────────────────────────
    function buildTop4Panel(sf) {
      const wrap = el('div', 'bp-top4-wrap');
      const lbl = el('div', 'bp-top4-label');
      lbl.innerHTML = '&#11045;&nbsp;&nbsp;Top 4 Finalists&nbsp;&nbsp;&#11045;';
      wrap.appendChild(lbl);
      const matches = sf.matches || [];
      for (let i = 0; i < 2; i++) {
        if (i > 0) wrap.appendChild(el('div', 'bp-top4-sep'));
        const match = matches[i];
        const pending = !match || match.status === 'pending';
        wrap.appendChild(buildTop4Row(match ? match.p1 : null, pending));
        wrap.appendChild(buildTop4Row(match ? match.p2 : null, pending));
      }
      return wrap;
    }

    function buildTop4Row(player, isPending) {
      const row = el('div', 'bp-top4-player');
      if (!player || isPending) {
        row.classList.add('tbd');
        row.innerHTML = `
          <div class="bp-avatar" style="background:rgba(255,255,255,0.08);">?</div>
          <span class="bp-seed">—</span>
          <span class="bp-name" style="color:rgba(255,255,255,0.28);">TBD</span>`;
        return row;
      }
      const name = getName(player.wallet);
      const isWallet = (name === fmtWallet(player.wallet));
      const color = avColor(player.seed || 1);
      const avatarUrl = playerAvatar[(player.wallet || '').toLowerCase()];
      const avInit = avInitial(name);
      const avatarHtml = avatarUrl
        ? `<img src="${esc(avatarUrl)}" alt="" onerror="var p=this.parentNode;p.textContent='${avInit}';p.style.background='${color}'">`
        : esc(avInit);
      const avatarBg = avatarUrl ? 'rgba(20,24,40,0.8)' : color;
      const countryCode = playerCountry[(player.wallet || '').toLowerCase()];
      const flagHtml = countryCode
        ? `<div class="bp-flag" style="background-image:url('https://flagcdn.com/80x60/${countryCode.toLowerCase()}.png');"></div>`
        : '';
      row.innerHTML = `
        <div class="bp-avatar-wrap">
          <div class="bp-avatar" style="background:${avatarBg};">${avatarHtml}</div>
          ${flagHtml}
        </div>
        <span class="bp-seed">#${player.seed}</span>
        <span class="bp-name${isWallet ? ' wallet' : ''}">${esc(name)}</span>
        <span class="bp-top4-crown">🏆</span>`;
      return row;
    }

    // ── DOM helpers ───────────────────────────────────────────────────────────
    function el(tag, className) {
      const d = document.createElement(tag || 'div');
      if (className) d.className = className;
      return d;
    }

    function makePairConn(mirror) {
      const d = el('div', 'bp-pconn' + (mirror ? ' r' : ''));
      d.innerHTML = `
        <div class="bp-pconn-s"></div>
        <div class="bp-pconn-t"></div>
        <div class="bp-pconn-b"></div>
        <div class="bp-pconn-s"></div>`;
      return d;
    }

    function makeH(w) {
      const d = el('div', 'bp-h');
      d.style.width = (w || 36) + 'px';
      return d;
    }

    function isEVMAddress(str) {
      return !str || /^0x[0-9a-fA-F]{40}$/i.test(str);
    }

    function fmtWallet(addr) {
      if (!addr || addr.length < 10) return addr || '—';
      return `${addr.slice(0, 6)}…${addr.slice(-4)}`;
    }

    function getName(wallet) {
      if (!wallet) return 'TBD';
      const key = wallet.toLowerCase();
      if (playerAliases[key]) return playerAliases[key];
      if (!isEVMAddress(wallet)) return wallet;
      return playerMap[key] || fmtWallet(wallet);
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Mobile round navigator ──────────────────────────────────────────────────
    let mobileNavRounds  = [];   // [{id, label, panel, dot}]
    let mobileNavIndex   = 0;
    let mobileTpSec      = null; // #third-section element
    let mobileTpVisible  = false; // whether it has content to show

    function initMobileNav() {
      if (window.innerWidth >= 1024) return;

      const bracketStage = document.getElementById('bracket-stage'); // original layout
      const stageWrap    = document.getElementById('stage-wrap');    // parent — panels go here
      const navEl   = document.getElementById('bp-round-nav');
      const prevBtn = document.getElementById('bp-rnav-prev');
      const nextBtn = document.getElementById('bp-rnav-next');
      const labelEl = document.getElementById('bp-rnav-label');
      const dotsEl  = document.getElementById('bp-rnav-dots');
      if (!bracketStage || !stageWrap || !navEl) return;

      // Reset state from any previous render
      mobileNavRounds = [];
      dotsEl.innerHTML = '';
      // Remove any existing round panels from a prior call (they live in stageWrap)
      stageWrap.querySelectorAll('.bp-round-panel').forEach(p => p.remove());

      const d = window.__bracketData;
      if (!d) return;

      const ROUND_LABELS = {
        r16: 'Round of 16',
        qf:  'Quarterfinals',
        sf:  'Semifinals',
      };

      // Determine which round ids are present (bracket stops at SF)
      const orderedRoundIds = ['r16', 'qf', 'sf'];
      const existingRoundIds = d.rounds ? d.rounds.map(r => r.id) : [];
      const roundIds = orderedRoundIds.filter(id => existingRoundIds.includes(id));

      // Collect all match cards from the original bracket layout
      const allCards = Array.from(bracketStage.querySelectorAll('.bp-card'));

      // Group cards by round based on known layout order
      let cardGroups = {};

      if (existingRoundIds.includes('r16') && existingRoundIds.includes('qf')) {
        // 16-player: L-R16(4), L-QF(2), L-SF(1), R-SF(1), R-QF(2), R-R16(4)
        const n = allCards.length;
        if (n >= 14) {
          cardGroups['r16'] = [
            allCards[0], allCards[1], allCards[2], allCards[3],
            allCards[n-4], allCards[n-3], allCards[n-2], allCards[n-1]
          ];
          cardGroups['qf'] = [
            allCards[4], allCards[5],
            allCards[n-6], allCards[n-5]
          ];
          cardGroups['sf'] = [allCards[6], allCards[n-7]];
        } else {
          // Partial data — best effort
          cardGroups['r16'] = allCards.slice(0, Math.min(4, n));
          cardGroups['qf']  = allCards.slice(4, Math.min(6, n));
          cardGroups['sf']  = allCards.slice(6, Math.min(7, n));
        }
      } else if (existingRoundIds.includes('qf')) {
        // 8-player: L-QF(2), L-SF(1), R-SF(1), R-QF(2)
        const n = allCards.length;
        if (n >= 6) {
          cardGroups['qf'] = [
            allCards[0], allCards[1],
            allCards[n-2], allCards[n-1]
          ];
          cardGroups['sf'] = [allCards[2], allCards[n-3]];
        } else {
          cardGroups['qf'] = allCards.slice(0, Math.min(4, n));
          cardGroups['sf'] = allCards.slice(4, Math.min(6, n));
        }
      }

      // Build panels — clone cards into round panel divs appended to stage
      roundIds.forEach((roundId, i) => {
        const panel = document.createElement('div');
        panel.className = 'bp-round-panel hidden';
        panel.dataset.round = roundId;

        const cards = cardGroups[roundId] || [];
        cards.forEach(card => {
          if (card) panel.appendChild(card.cloneNode(true));
        });

        stageWrap.appendChild(panel);

        // Dot indicator
        const dot = document.createElement('div');
        dot.className = 'bp-rnav-dot';
        dot.dataset.index = i;
        dotsEl.appendChild(dot);

        mobileNavRounds.push({ id: roundId, label: ROUND_LABELS[roundId] || roundId, panel, dot });
      });

      mobileNavIndex = 0;

      // Remove old listeners by replacing buttons (cloneNode trick)
      const newPrev = prevBtn.cloneNode(true);
      const newNext = nextBtn.cloneNode(true);
      prevBtn.parentNode.replaceChild(newPrev, prevBtn);
      nextBtn.parentNode.replaceChild(newNext, nextBtn);

      newPrev.addEventListener('click', () => {
        if (mobileNavIndex > 0) { mobileNavIndex--; renderMobileNav(); }
      });
      newNext.addEventListener('click', () => {
        if (mobileNavIndex < mobileNavRounds.length - 1) { mobileNavIndex++; renderMobileNav(); }
      });

      // Hide original bracket layout — panels take over on mobile
      bracketStage.style.display = 'none';

      navEl.style.display = 'flex';
      renderMobileNav();
    }

    function renderMobileNav() {
      const labelEl = document.getElementById('bp-rnav-label');
      const prevBtn = document.getElementById('bp-rnav-prev');
      const nextBtn = document.getElementById('bp-rnav-next');

      mobileNavRounds.forEach((r, i) => {
        r.panel.classList.toggle('hidden', i !== mobileNavIndex);
        r.dot.classList.toggle('active', i === mobileNavIndex);
      });

      if (labelEl) labelEl.textContent = mobileNavRounds[mobileNavIndex]?.label || '';
      if (prevBtn) prevBtn.disabled = mobileNavIndex === 0;
      if (nextBtn) nextBtn.disabled = mobileNavIndex === mobileNavRounds.length - 1;

      // Scroll to top of page when switching rounds
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Scale-to-fit (tablet + desktop only) ─────────────────────────────────
    function applyBracketScale() {
      if (window.innerWidth < 1024) return;
      const stageWrap = document.getElementById('stage-wrap');
      const host      = document.getElementById('bp-scale-host');
      if (!stageWrap || !host) return;

      // Reset any previous scale so we measure native dimensions
      stageWrap.style.transform       = '';
      stageWrap.style.transformOrigin = '';
      host.style.width    = '';
      host.style.height   = '';
      host.style.overflow = '';
      void stageWrap.offsetWidth; // force reflow

      const nativeW  = stageWrap.scrollWidth;
      const nativeH  = stageWrap.scrollHeight;
      const isEmbed  = document.documentElement.classList.contains('embed-mode');
      const pagePad  = isEmbed ? 0 : 56; // embed: no padding; normal: 28px × 2
      const available = window.innerWidth - pagePad;
      const scale    = Math.min(1.0, available / nativeW);
      if (scale >= 1.0) return; // bracket fits natively — no transform needed

      stageWrap.style.transformOrigin = 'top left';
      stageWrap.style.transform       = `scale(${scale})`;
      host.style.width    = Math.ceil(nativeW * scale) + 'px';
      host.style.height   = Math.ceil(nativeH * scale) + 'px';
      host.style.overflow = 'hidden';
    }

    window.addEventListener('resize', () => {
      if (window.innerWidth >= 1024) applyBracketScale();
    });

    // ── Auto-refresh ──────────────────────────────────────────────────────────
    setInterval(async () => {
      await loadPlayers();
      await loadBracket();
    }, 60000);

    init();
  </script>
  <script>
    const SCREENSHOT_SVG_ICON = `
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 1H3a2 2 0 0 0-2 2v3M10 1h3a2 2 0 0 1 2 2v3M6 15H3a2 2 0 0 1-2-2v-3M10 15h3a2 2 0 0 0 2-2v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/>
      </svg>`;

    async function downloadBracketJpg() {
      // Lazy-load html2canvas only when needed
      if (typeof html2canvas === 'undefined') {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
      }
      const bracketEl = document.getElementById('state-bracket');
      const btn       = document.getElementById('screenshot-btn');
      if (!bracketEl || bracketEl.style.display === 'none') return;

      btn.disabled = true;
      btn.textContent = 'Saving…';

      // ── Overlay spinner — shown immediately so layout changes are invisible ──
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(9,12,22,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;';
      const spinEl = document.createElement('div');
      spinEl.style.cssText = 'width:44px;height:44px;border-radius:50%;border:3px solid rgba(0,174,250,0.18);border-top-color:#00aefa;animation:bp-spin 0.85s linear infinite;';
      const spinLabel = document.createElement('span');
      spinLabel.style.cssText = 'font-size:0.78rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.45);font-family:inherit;';
      spinLabel.textContent = 'Saving…';
      overlay.appendChild(spinEl);
      overlay.appendChild(spinLabel);
      if (!document.getElementById('bp-spin-kf')) {
        const kf = document.createElement('style');
        kf.id = 'bp-spin-kf';
        kf.textContent = '@keyframes bp-spin{to{transform:rotate(360deg)}}';
        document.head.appendChild(kf);
      }
      document.body.appendChild(overlay);

      // ── Force desktop layout regardless of current viewport ──────────────────
      const bracketStage = document.getElementById('bracket-stage');
      const roundNav     = document.getElementById('bp-round-nav');
      const roundPanels  = Array.from(document.querySelectorAll('.bp-round-panel'));

      if (bracketStage) bracketStage.style.display = '';
      roundPanels.forEach(p => { p.style.display = 'none'; });
      if (roundNav) roundNav.style.display = 'none';

      const overrideStyle = document.createElement('style');
      overrideStyle.textContent = `
        .bp-screenshot-mode .bp-page { padding: 36px 28px 44px !important; justify-content: flex-start !important; align-items: flex-start !important; overflow: visible !important; }
        .bp-screenshot-mode .bp-title { padding: 0 !important; width: auto !important; }
        .bp-screenshot-mode .bp-title-text { font-size: 2.0rem !important; white-space: pre-line !important; word-break: normal !important; }
        .bp-screenshot-mode .bp-gf-label { display: block !important; }
        .bp-screenshot-mode .bp-stage { flex-direction: row !important; }
        .bp-screenshot-mode .bp-label-row { display: flex !important; }
        .bp-screenshot-mode .bp-pconn, .bp-screenshot-mode .bp-qfsf-conn { display: flex !important; }
        .bp-screenshot-mode .bp-h, .bp-screenshot-mode .bp-pconn-s, .bp-screenshot-mode .bp-pconn-t,
        .bp-screenshot-mode .bp-pconn-b, .bp-screenshot-mode .bp-qfsf-s, .bp-screenshot-mode .bp-qfsf-t,
        .bp-screenshot-mode .bp-qfsf-b { display: block !important; }
        .bp-screenshot-mode .bp-card { width: 338px !important; border-radius: 11px !important; }
        .bp-screenshot-mode .bp-card.gf { width: 380px !important; }
        .bp-screenshot-mode .bp-player { height: 65px !important; padding: 0 17px !important; }
        .bp-screenshot-mode .bp-avatar { width: 44px !important; height: 44px !important; font-size: 0.94rem !important; }
        .bp-screenshot-mode .bp-flag { width: 26px !important; height: 26px !important; bottom: -10px !important; right: -10px !important; }
        .bp-screenshot-mode .bp-name { font-size: 1.14rem !important; padding-bottom: 3px !important; }
        .bp-screenshot-mode .bp-name.wallet { font-size: 1.0rem !important; }
        .bp-screenshot-mode .bp-score { font-size: 1.20rem !important; }
        .bp-screenshot-mode .bp-seed { font-size: 0.83rem !important; min-width: 31px !important; }
        .bp-screenshot-mode .bp-qf-col { gap: var(--qg) !important; align-self: center !important; }
        .bp-screenshot-mode .bp-sf { align-self: center !important; }
        .bp-screenshot-mode .bp-third { margin-top: 32px !important; padding: 0 !important; width: auto !important; flex-direction: column !important; align-items: center !important; gap: 8px !important; }
        .bp-screenshot-mode .bp-third-label { margin: 0 !important; }
        .bp-screenshot-mode .bp-champion { margin-top: 32px !important; }
        .bp-screenshot-mode .bp-champion-avatar { width: 108px !important; height: 108px !important; font-size: 2.70rem !important; }
        .bp-screenshot-mode .bp-champion-name { font-size: 1.36rem !important; }
      `;
      document.head.appendChild(overrideStyle);
      document.documentElement.classList.add('bp-screenshot-mode');

      const stageWrap      = document.getElementById('stage-wrap');
      const scaleHost      = document.getElementById('bp-scale-host');
      const savedTransform = stageWrap ? stageWrap.style.transform       : '';
      const savedTfOrigin  = stageWrap ? stageWrap.style.transformOrigin : '';
      const savedHostW     = scaleHost ? scaleHost.style.width    : '';
      const savedHostH     = scaleHost ? scaleHost.style.height   : '';
      const savedHostOv    = scaleHost ? scaleHost.style.overflow : '';
      if (stageWrap) { stageWrap.style.transform = ''; stageWrap.style.transformOrigin = ''; }
      if (scaleHost) { scaleHost.style.width = ''; scaleHost.style.height = ''; scaleHost.style.overflow = ''; }
      void document.body.offsetWidth; // force reflow

      // ── Metadata overlay (tournament name + date) ────────────────────────────
      const meta = document.createElement('div');
      meta.id = 'bp-screenshot-meta';
      const tournamentName = document.querySelector('.bp-title-text')?.textContent?.trim() || 'Anichess Tournament';
      const dateStr = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      meta.textContent = `${tournamentName} · ${dateStr}`;
      meta.style.cssText = 'position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:0.78rem;color:rgba(255,255,255,0.55);letter-spacing:0.05em;pointer-events:none;z-index:10;font-family:inherit;';
      const stage = document.getElementById('bp-page') || document.getElementById('bracket-stage');
      if (stage) { stage.style.position = 'relative'; stage.appendChild(meta); }

      // ── Capture dimensions from stageWrap (unaffected by page overflow) ──────
      // pageEl.scrollWidth = viewport width on mobile (overflow:visible → scrollWidth=clientWidth)
      // stageWrap.scrollWidth = actual rendered bracket width via min-width:min-content
      const pageEl   = document.getElementById('bp-page');
      const padX     = 56;  // bp-page desktop: 28px × 2
      const padY     = 80;  // bp-page desktop: 36px top + 44px bottom
      const captureW = stageWrap ? stageWrap.scrollWidth  + padX : pageEl.offsetWidth;
      const captureH = stageWrap ? stageWrap.scrollHeight + padY : pageEl.scrollHeight;

      // Temporarily apply the page background so it appears in the screenshot
      const bgEl    = document.getElementById('bp-bg');
      const bgImage = bgEl ? window.getComputedStyle(bgEl).backgroundImage : 'none';
      const origBg    = pageEl.style.backgroundImage;
      const origBgSz  = pageEl.style.backgroundSize;
      const origBgPos = pageEl.style.backgroundPosition;
      if (bgImage && bgImage !== 'none') {
        pageEl.style.backgroundImage    =
          `linear-gradient(to bottom,rgba(6,9,20,0.88) 0%,rgba(6,9,20,0.75) 40%,rgba(6,9,20,0.88) 100%),${bgImage}`;
        pageEl.style.backgroundSize     = 'cover';
        pageEl.style.backgroundPosition = 'center';
      }

      // Rewrite avatar src to same-origin proxy so html2canvas can render them
      const avatarImgs = [];
      const loadPromises = [];
      pageEl.querySelectorAll('img').forEach(img => {
        if (img.src && img.src.includes('avatar.anichess.com')) {
          const orig = img.src;
          avatarImgs.push({ img, orig });
          loadPromises.push(new Promise(resolve => {
            const done = () => { img.onload = null; img.onerror = null; resolve(); };
            img.onload  = done;
            img.onerror = done;
            img.src = `/api/proxy-image?url=${encodeURIComponent(orig)}`;
          }));
        }
      });
      await Promise.all(loadPromises);

      try {
        const canvas = await html2canvas(pageEl, {
          backgroundColor: '#090c16',
          useCORS: true,
          allowTaint: false,
          scale: 2,
          logging: false,
          width:        captureW,
          height:       captureH,
          windowWidth:  captureW,
          windowHeight: captureH,
          scrollX: 0,
          scrollY: 0,
        });

        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'anichess-bracket.jpg';
          a.click();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        }, 'image/jpeg', 0.95);
      } catch (err) {
        console.error('Screenshot failed:', err);
        alert('Screenshot failed: ' + (err && err.message ? err.message : 'unknown error'));
      } finally {
        avatarImgs.forEach(({ img, orig }) => { img.src = orig; });
        const metaEl = document.getElementById('bp-screenshot-meta');
        if (metaEl) metaEl.remove();
        pageEl.style.backgroundImage    = origBg;
        pageEl.style.backgroundSize     = origBgSz;
        pageEl.style.backgroundPosition = origBgPos;
        if (stageWrap) { stageWrap.style.transform = savedTransform; stageWrap.style.transformOrigin = savedTfOrigin; }
        if (scaleHost) { scaleHost.style.width = savedHostW; scaleHost.style.height = savedHostH; scaleHost.style.overflow = savedHostOv; }
        document.documentElement.classList.remove('bp-screenshot-mode');
        if (overrideStyle.parentNode) overrideStyle.parentNode.removeChild(overrideStyle);
        if (mobileNavRounds.length > 0) {
          if (bracketStage) bracketStage.style.display = 'none';
          roundPanels.forEach(p => { p.style.display = ''; });
          if (roundNav) roundNav.style.display = 'flex';
          mobileNavRounds.forEach((r, i) => {
            r.panel.classList.toggle('hidden', i !== mobileNavIndex);
          });
        } else {
          roundPanels.forEach(p => { p.style.display = ''; });
          if (roundNav) roundNav.style.display = '';
        }
        // Fade out overlay after layout is restored
        overlay.style.transition = 'opacity 0.25s ease';
        overlay.style.opacity = '0';
        setTimeout(() => { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 280);
        btn.disabled = false;
        btn.innerHTML = SCREENSHOT_SVG_ICON + ' Save as JPG';
      }
    }
  </script>
